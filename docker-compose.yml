services:
  harry-brain:
    build: .
    environment:
      - HARRY_DB_PATH=/data/harry.db
      - HARRY_DATA_DIR=/data
    volumes:
      - harry_data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://0.0.0.0:8787/health').read()\""]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    ports:
      - "8787:8787"
volumes:
  harry_data:
